<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ayang 💜</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #5f2c82, #9c6ade);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Soft glow background */
body::before {
    content: "";
    position: absolute;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.1);
    filter: blur(100px);
    border-radius: 50%;
    top: 20%;
    left: 30%;
}

/* Container */
.container {
    text-align: center;
    position: relative;
}

/* Envelope */
.envelope {
    width: 240px;
    height: 150px;
    background: rgba(123,63,191,0.9);
    backdrop-filter: blur(10px);
    position: relative;
    cursor: pointer;
    border-radius: 15px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    animation: float 3s ease-in-out infinite;
}

/* Floating animation */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

/* Flap */
.flap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 75px solid #a678de;
    top: 0;
    transform-origin: top;
    transition: transform 0.7s ease;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* Seal */
.seal {
    position: absolute;
    width: 35px;
    height: 35px;
    background: #ff8bdc;
    border-radius: 50%;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 10px #ff8bdc;
}

/* Polaroid */
.polaroid {
    display: none;
    width: 180px;
    background: white;
    padding: 10px 10px 25px;
    border-radius: 6px;
    margin: 0 auto;
    transform: translateY(-20px) rotate(-2deg);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    animation: popUp 1s ease;
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

@keyframes popUp {
    from { transform: translateY(60px) scale(0.7); opacity: 0; }
    to { transform: translateY(-20px) scale(1); opacity: 1; }
}

/* Letter */
.letter {
    display: none;
    margin-top: 15px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    width: 90%;
    max-width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Title */
.title {
    font-size: 30px;
    font-family: cursive;
    color: #7b3fbf;
    margin-bottom: 10px;
}

/* Text */
.text {
    font-size: 15px;
    color: #333;
    white-space: pre-line;
    line-height: 1.6;
}

</style>
</head>

<body>

<div class="container">

    <div class="envelope" onclick="openEnvelope()" id="env">
        <div class="flap"></div>
        <div class="seal"></div>
    </div>

    <div class="polaroid" id="photo">
        <img src="IMG20260301143802.jpg">
    </div>

    <div class="letter" id="letter">
        <div class="title">Congratulations Ayang 💜</div>
        <div class="text" id="text"></div>
    </div>

</div>

<!-- Sounds -->
<audio id="clickSound" src="Kalapastangan (Live at The Cozy Cove) - fitterkarma.mp3"></audio>
<audio id="bgMusic" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0e66.mp3" loop></audio>

<script>

const message = `I'm so proud of you, sobra. Hindi mo lang alam kung gaano ako ka-happy sa lahat ng achievements mo. Every effort, every puyat, every struggle—you really earned all of it. Deserve na deserve mo lahat ng meron ka ngayon.

Honestly, ang saya lang makita na you're growing into someone na ang strong and inspiring. Kahit minsan mahirap, you still keep going, and that says a lot about you. Sana alam mo na I'm always here, cheering for you quietly and loudly at the same time.

I hope nagustuhan mo yung gift ko, kahit simple lang siya. Galing yun sa puso ko. And I just want you to remember na no matter what happens, I'm always proud of you. Keep shining, Ayang 💜`;

function openEnvelope() {
    const env = document.getElementById("env");

    document.getElementById("clickSound").play();
    document.getElementById("bgMusic").play();

    env.classList.add("open");

    setTimeout(() => {
        document.getElementById("photo").style.display = "block";
    }, 400);

    setTimeout(() => {
        document.getElementById("letter").style.display = "block";
        document.getElementById("text").innerText = message;
    }, 900);
}

</script>

</body>
</html>
